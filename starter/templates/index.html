<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loading-text">Generating puzzle...</p>
    </div>
  </div>

  <div style="position: relative; margin: 0 8px;">
    <h1>Sudoku Game</h1>
    <button id="dark-mode-toggle" style="position: absolute; right: 0; top: 20px;" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
  </div>
  <div class="game-info">
    <div class="difficulty-selector">
      <label for="difficulty">Difficulty:</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
    <div class="timer-display">
      <span id="timer">00:00</span>
    </div>
  </div>
  <div id="message-container"></div>
  <div id="sudoku-board"></div>
  <div class="controls">
    <button id="new-game">New Game</button>
    <button id="hint">Hint</button>
    <button id="check-solution">Check Solution</button>
  </div>
  
  <!-- Top 10 Scores Section -->
  <section class="top-scores-section">
    <h2>Top 10 Scores</h2>
    <div id="top-scores-list"></div>
  </section>
  <script src="/static/main.js"></script>
</body>
</html>
